{% extends "base.html" %}

{% block content %}
<div class="container mt-5" role="alert" aria-label="Error de aplicación">
    <div class="alert alert-danger">
        <h4 class="alert-heading">{% trans %}Error{% endtrans %}</h4>
        <p>{{ error }}</p>
        <hr>
        <p class="mb-0">
            <a href="{{ url_for('index') }}" class="btn btn-primary">
                {% trans %}Return to Homepage{% endtrans %}
            </a>
        </p>
    </div>
</div>
{% endblock %}
