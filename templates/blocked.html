<!DOCTYPE html>
<html>
{% extends "base.html" %}

<head>
    <title>Access Blocked</title>
</head>

{% block content %}
<div class="card border-danger shadow-lg mt-5">
    <div class="card-header bg-danger bg-gradient text-white d-flex align-items-center">
        <i class="bi bi-shield-exclamation me-2"></i>
        <h5 class="mb-0">{% trans %}Access Blocked{% endtrans %}</h5>
    </div>
    <div class="card-body">
        <div class="alert alert-danger">
            <strong><i class="bi bi-x-octagon me-1"></i>{% trans %}{{ reason }}{% endtrans %}</strong>
        </div>
        <a href="{{ url_for('index') }}" class="btn btn-secondary btn-lg"><i class="bi bi-house"></i> {% trans %}Go to Home{% endtrans %}</a>
    </div>
</div>
{% endblock %}
