<!DOCTYPE html>
<html>
<head>
    <title>WiFi Scanner</title>
</head>
<body>
    <h1>Redes WiFi disponibles</h1>
    <ul id="wifi-list"></ul>

    <h2>Conectar a red WiFi</h2>
    <label for="ssid">SSID:</label>
    <input type="text" id="ssid" readonly><br>
    <label for="password">Contraseña:</label>
    <input type="password" id="password"><br>
    <button onclick="connect()">Conectar</button>

    <p id="response"></p>

    <script>
        async function loadWifiList() {
            const res = await fetch('/api/wifi/scan');
            const data = await res.json();
            const list = document.getElementById('wifi-list');
            list.innerHTML = '';
            data.ssids.forEach(ssid => {
                const li = document.createElement('li');
                li.textContent = ssid;
                li.onclick = () => document.getElementById('ssid').value = ssid;
                list.appendChild(li);
            });
        }

        async function connect() {
            const ssid = document.getElementById('ssid').value;
            const password = document.getElementById('password').value;

            const responseEl = document.getElementById('response');
            responseEl.textContent = 'Conectando...';

            const res = await fetch('/api/wifi/connect', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ ssid, password })
            });

            try {
                const data = await res.json();
                responseEl.textContent = data.message;
            } catch (err) {
                responseEl.textContent = 'Error: respuesta no válida del servidor.';
            }
        }

        loadWifiList();
    </script>
</body>
</html>
