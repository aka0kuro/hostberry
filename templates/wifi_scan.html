{% extends 'base.html' %}

{% block title %}{% trans %}WiFi Scanner{% endtrans %}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0">
                <i class="fas fa-wifi me-2"></i>Redes WiFi Disponibles
                <button id="rescanBtn" class="btn btn-sm btn-light float-end">
                    <i class="fas fa-sync-alt me-1"></i>Escanear
                </button>
            </h5>
        </div>
        
        <div class="card-body p-0">
            <div id="wifiStatusAlert" class="alert alert-warning d-none mb-0 rounded-0">
                <i class="fas fa-exclamation-triangle me-2"></i>
                <span id="wifiStatusText"></span>
                <button id="enableWifiBtn" class="btn btn-sm btn-outline-dark ms-2 d-none">
                    Activar WiFi
                </button>
            </div>
            
            <div id="network-list" class="list-group list-group-flush">
                <!-- Las redes se agregarán dinámicamente aquí -->
            </div>
        </div>
    </div>

    <!-- Modal de conexión -->
    <div class="modal fade" id="connectModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Conectar a red</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">SSID</label>
                        <input type="text" id="ssid" class="form-control" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input type="password" id="password" class="form-control" placeholder="Ingresa la contraseña">
                        <div class="form-text">
                            <i class="fas fa-lock me-1"></i>
                            <span id="securityTypeText">Red segura</span>
                        </div>
                    </div>
                    <div class="progress d-none" id="connectProgress">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="connectBtn" class="btn btn-primary">
                        <i class="fas fa-plug me-1"></i>Conectar
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Contenedor para notificaciones estilo Toast -->
    <div id="toastContainer" style="position: fixed; bottom: 10px; right: 10px;"></div>
</div>

<script>
function updateNetworkList(networks) {
    const list = $('#network-list');
    list.empty();
    
    // Ordenar por intensidad de señal (mayor primero)
    networks.sort((a, b) => parseInt(b.signal) - parseInt(a.signal));
    
    networks.forEach(network => {
        const signalStrength = parseInt(network.signal);
        let signalClass = 'text-danger';
        if (signalStrength > 70) signalClass = 'text-success';
        else if (signalStrength > 40) signalClass = 'text-warning';
        
        const securityIcon = network.security === 'Open' ? 'fa-unlock' : 'fa-lock';
        
        list.append(`
            <div class="list-group-item list-group-item-action">
                <div class="d-flex w-100 justify-content-between">
                    <h6 class="mb-1">${network.ssid}</h6>
                    <small class="${signalClass}">
                        <i class="fas fa-signal me-1"></i>${network.signal}
                    </small>
                </div>
                <div class="d-flex justify-content-between align-items-center">
                    <small>
                        <i class="fas ${securityIcon} me-1"></i>
                        ${network.security || 'Open'}
                    </small>
                    <button class="btn btn-sm btn-outline-primary connect-btn" 
                            data-ssid="${network.ssid}"
                            data-security="${network.security}">
                        Conectar
                    </button>
                </div>
            </div>
        `);
    });
}

// Mostrar notificación estilo Toast
function showToast(message, type = 'info') {
    const toast = $(`
        <div class="toast align-items-center text-white bg-${type} border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">
                    ${message}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
    `);
    
    $('#toastContainer').append(toast);
    toast.toast({ delay: 3000 }).toast('show');
    
    toast.on('hidden.bs.toast', function() {
        $(this).remove();
    });
}

// Verificar que jQuery esté cargado
if (window.jQuery) {
    $(document).ready(function() {
        console.log('jQuery loaded, initializing WiFi scan...');

        // 1. Botón Connect
        $(document).off('click', '#connectBtn').on('click', '#connectBtn', async function(e) {
            e.preventDefault();
            await connectToNetwork();
        });

        // 2. Botón Enable WiFi
        $(document).off('click', '#enableWifiBtn').on('click', '#enableWifiBtn', function(e) {
            e.preventDefault();
            const btn = $(this);
            const originalHtml = btn.html();
            
            btn.prop('disabled', true).html(
                '<span class="spinner-border spinner-border-sm"></span> Activando...'
            );
            
            fetch('/api/enable_wifi', {
                method: 'POST',
                headers: {
                    'X-CSRFToken': '{{ csrf_token() }}'
                }
            })
            .then(response => response.json())
            .then(data => {
                if (!data.success) {
                    throw new Error(data.error || 'Error al activar WiFi');
                }
                location.reload();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Error: ' + error.message);
            })
            .finally(() => {
                btn.prop('disabled', false).html(originalHtml);
            });
        });

        // 3. Botón Rescan
        $(document).off('click', '#rescanBtn').on('click', '#rescanBtn', async function(e) {
            e.preventDefault();
            const btn = $(this);
            const originalHtml = btn.html();
            
            btn.prop('disabled', true).html(
                '<span class="spinner-border spinner-border-sm"></span> Escaneando...'
            );
            
            try {
                const response = await fetch('/api/wifi/scan', {
                    headers: {
                        'X-CSRFToken': '{{ csrf_token() }}'
                    }
                });
                
                const data = await response.json();
                
                if (!response.ok || !data.success) {
                    throw new Error(data.error || 'Scan failed');
                }
                
                // Actualizar UI con redes
                updateNetworkList(data.networks);
                
            } catch (error) {
                console.error('Scan error:', error);
                alert('Error: ' + error.message);
            } finally {
                btn.prop('disabled', false).html(originalHtml);
            }
        });

        // Configuración inicial
        checkWifiStatus();
    });
} else {
    console.error('jQuery no está disponible');
    alert('Error: jQuery no está cargado. Recarga la página.');
}

async function rescanNetworks() {
    try {
        const response = await fetch('/api/wifi/scan', {
            headers: {
                'X-CSRFToken': '{{ csrf_token() }}'
            }
        });
        const data = await response.json();
        
        if (!data.success) {
            throw new Error(data.error || 'Scan failed');
        }
        
        // Actualizar UI con redes
        updateNetworkList(data.networks);
        
    } catch (error) {
        console.error('Scan error:', error);
        alert('Error: ' + error.message);
    }
}

async function connectToNetwork() {
    const ssid = $('#ssid').val();
    const password = $('#password').val();
    
    const modal = $('#connectModal');
    const connectBtn = $('#connectBtn');
    const originalText = connectBtn.html();
    const progress = $('#connectProgress');
    
    // Mostrar estado de conexión
    connectBtn.prop('disabled', true).html('<i class="fas fa-spinner fa-spin me-1"></i> Conectando...');
    progress.removeClass('d-none');
    
    try {
        const response = await fetch('/api/wifi/connect', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': '{{ csrf_token() }}'
            },
            body: JSON.stringify({ ssid, password })
        });
        
        const data = await response.json();
        
        if (!data.success) {
            throw new Error(data.error || 'Connection failed');
        }
        
        showToast('¡Conectado exitosamente!', 'success');
        modal.modal('hide');
        setTimeout(() => location.reload(), 1500);
        
    } catch (error) {
        console.error('Connection error:', error);
        showToast(`Error: ${error.message}`, 'danger');
    } finally {
        connectBtn.prop('disabled', false).html(originalText);
        progress.addClass('d-none');
    }
}

function checkWifiStatus() {
    fetch('/api/wifi_status')
        .then(response => response.json())
        .then(data => {
            if (!data.enabled) {
                $('#wifiStatusAlert').removeClass('d-none');
                $('#wifiStatusText').text('WiFi está desactivado');
                $('#enableWifiBtn').removeClass('d-none');
            }
        })
        .catch(error => console.error('Error:', error));
}
</script>
{% endblock %}
